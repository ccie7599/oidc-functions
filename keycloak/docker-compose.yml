services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: oidc-demo-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      # Realm is imported on first start: client, cp-admins group, demo users, groups mapper.
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 5s
      timeout: 5s
      retries: 30
