# Apply once with kubectl; Argo CD then syncs everything under k8s/ from git and
# self-heals drift. (harbor-creds secret + the Vault secret are created out-of-band
# and are intentionally NOT in this repo — never commit registry/IdP creds.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oidc-cp-keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ccie7599/oidc-functions.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-oidc-cp
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
