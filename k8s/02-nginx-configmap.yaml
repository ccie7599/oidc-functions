# TLS-terminating reverse proxy in front of Keycloak (the house pattern in this LZ).
# nginx holds the cert-manager cert and forwards cleartext to Keycloak on :8080,
# setting X-Forwarded-* so Keycloak builds correct https issuer/redirect URLs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-tls-proxy-conf
  namespace: demo-oidc-cp
data:
  default.conf: |
    server {
      listen 443 ssl;
      http2 on;
      server_name keycloak.connected-cloud.io;

      ssl_certificate     /etc/nginx/ssl/tls.crt;
      ssl_certificate_key /etc/nginx/ssl/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;

      # Keycloak admin endpoints can carry large headers (SAML/long tokens).
      large_client_header_buffers 4 32k;
      proxy_buffer_size 16k;
      proxy_buffers 8 16k;

      location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
      }
    }
